  <style>
    /* Fade-in + slide-up animation */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.7; }
    }

    .anim-card      { animation: fadeSlideUp 0.6s ease 0.15s both; }
    .anim-logo      { animation: fadeSlideUp 0.5s ease 0s both; }
    .anim-footer    { animation: fadeIn 0.5s ease 0.4s both; }

    .otp-display {
      font-family: 'Manrope', monospace;
      user-select: all;
    }
    .otp-digit {
      font-family: 'Manrope', monospace;
      font-weight: 800;
      font-size: clamp(1.6rem, 5vw, 2.5rem);
      line-height: 1;
      color: #006190;
      min-width: 0;
      flex: 1;
      text-align: center;
    }

    /* Copy success feedback */
    .copy-success {
      animation: pulse-soft 0.5s ease 2;
    }

    /* Subtle card glassmorphism */
    .glass-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
  </style>
</head>

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden">

  <!-- Ambient Background Blobs -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden z-0" aria-hidden="true">
    <div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
    <div class="absolute top-[60%] -right-[10%] w-[50%] h-[50%] rounded-full bg-secondary/5 blur-[120px]"></div>
  </div>

  <!-- Main Content -->
  <main class="flex-grow flex items-center justify-center p-margin-mobile relative z-10">
    <div class="w-full max-w-[440px]">

      <!-- Logo & Branding -->
      <div class="anim-logo flex flex-col items-center mb-stack-lg">
        <img
          id="logo-ldm"
          src="https://retract-gratitude-unwind.ngrok-free.dev/logo_ldm.png"
          alt="PT. Lintas Data Multimedia"
          class="h-16 md:h-20 w-auto object-contain mb-stack-sm drop-shadow-sm"
          onerror="this.onerror=null; this.src=''; this.alt='PT. Lintas Data Multimedia'; this.parentElement.querySelector('.logo-fallback').style.display='block'; this.style.display='none';"
        >
        <!-- Fallback text logo -->
        <span class="logo-fallback hidden font-headline-md text-headline-md text-primary font-bold mb-stack-sm text-center">
          PT. Lintas Data Multimedia
        </span>
        <div class="h-[3px] w-12 bg-primary rounded-full mt-2"></div>
      </div>

      <!-- OTP Card -->
      <div class="anim-card glass-card border border-outline-variant/40 rounded-2xl p-8 shadow-[0_8px_30px_rgba(0,97,144,0.08)]">

        <!-- Header -->
        <header class="text-center mb-stack-md">
          <h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-3">
            Kode OTP Login
          </h1>
          <p class="font-body-md text-on-surface-variant text-sm">
            Halo <strong id="username-display" class="text-on-surface">Pengguna</strong>,
          </p>
          <p class="font-body-md text-on-surface-variant text-sm mt-1 max-w-[280px] mx-auto">
            Gunakan kode di bawah ini untuk masuk ke akun Anda.
            Jaga kerahasiaan kode ini.
          </p>
        </header>

        <!-- OTP Code Display -->
        <div class="flex flex-col items-center gap-3 py-2">
          <div
            id="otp-code-box"
            class="otp-display flex items-center justify-center gap-1 bg-surface-container-low px-4 py-6 rounded-xl border border-outline-variant/30 shadow-inner w-full select-all"
            aria-label="Kode OTP"
          >
            <span class="otp-digit" id="d1">–</span>
            <span class="otp-digit" id="d2">–</span>
            <span class="otp-digit" id="d3">–</span>
            <span class="otp-digit" id="d4">–</span>
            <span class="otp-digit" id="d5">–</span>
            <span class="otp-digit" id="d6">–</span>
          </div>

          <!-- Copy Button -->
          <button
            id="copy-btn"
            type="button"
            class="inline-flex items-center gap-2 text-primary font-label-md text-label-md hover:bg-primary/8 px-4 py-2 rounded-full transition-colors border border-transparent hover:border-primary/20"
            onclick="copyOTP()"
          >
            <span class="material-symbols-outlined text-[18px]" id="copy-icon">content_copy</span>
            <span id="copy-label">Salin Kode</span>
          </button>
        </div>

        <!-- Expiry Info -->
        <div class="text-center mt-4 mb-2">
          <p class="font-body-md text-on-surface-variant text-sm">
            Waktu kedaluwarsa kode: <strong id="expiry-display" class="text-on-surface">5 Menit</strong>
          </p>
        </div>

        <!-- Divider -->
        <div class="border-t border-outline-variant/30 my-stack-md"></div>

        <!-- Resend Section -->
        <div class="text-center">
          <p class="font-body-md text-on-surface-variant text-sm mb-1">Kode belum diterima?</p>
          <button
            type="button"
            id="resend-btn"
            disabled
            class="text-primary font-label-md text-label-md hover:underline decoration-2 underline-offset-4 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Dapatkan Kode Baru <span id="timer" class="ml-1">(00:59)</span>
          </button>
        </div>
      </div>

      <!-- Footer Help -->
      <footer class="anim-footer mt-stack-md text-center">
        <a
          href="#"
          class="inline-flex items-center gap-2 text-on-surface-variant/70 hover:text-primary transition-colors text-sm font-label-md"
          id="help-link"
        >
          <span class="material-symbols-outlined text-[16px]">help_outline</span>
          <span>Butuh bantuan? Hubungi CS kami</span>
        </a>
      </footer>

    </div>
  </main>

  <script>
    // ─── Read query params ────────────────────────────────────────────────────
    const params     = new URLSearchParams(window.location.search);
    const username   = params.get('username') || params.get('name') || 'Pengguna';
    const otpCode    = params.get('otp')      || params.get('code') || '';
    const expiryMin  = parseInt(params.get('expiry') || '5', 10);

    // ─── Populate username ────────────────────────────────────────────────────
    document.getElementById('username-display').textContent = username;

    // ─── Populate OTP code ────────────────────────────────────────────────────
    const otpBox = document.getElementById('otp-code-box');
    if (otpCode) {
      const digits = otpCode.replace(/\s/g, '').split('');
      ['d1','d2','d3','d4','d5','d6'].forEach((id, i) => {
        const el = document.getElementById(id);
        if (el) el.textContent = digits[i] || '–';
      });
    }

    // ─── Expiry display ────────────────────────────────────────────────────────
    document.getElementById('expiry-display').textContent = `${expiryMin} Menit`;

    // ─── Copy OTP ─────────────────────────────────────────────────────────────
    function copyOTP() {
      const code = otpCode
        ? otpCode.replace(/\s/g, '')
        : ['d1','d2','d3','d4','d5','d6'].map(id => (document.getElementById(id)||{}).textContent||'').join('').replace(/[–-]/g,'');
      if (!code || code.length < 6) return;

      navigator.clipboard.writeText(code).then(() => {
        const icon  = document.getElementById('copy-icon');
        const label = document.getElementById('copy-label');
        const btn   = document.getElementById('copy-btn');
        icon.textContent  = 'check_circle';
        label.textContent = 'Tersalin!';
        btn.classList.add('text-green-600', 'copy-success');
        btn.classList.remove('text-primary');

        setTimeout(() => {
          icon.textContent  = 'content_copy';
          label.textContent = 'Salin Kode';
          btn.classList.remove('text-green-600', 'copy-success');
          btn.classList.add('text-primary');
        }, 2000);
      }).catch(() => {
        // Fallback for older browsers
        const el = document.createElement('textarea');
        el.value = code;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
      });
    }

    // ─── Countdown Timer (59 seconds) ─────────────────────────────────────────
    let timeLeft = 59;
    const timerEl   = document.getElementById('timer');
    const resendBtn = document.getElementById('resend-btn');

    const countdown = setInterval(() => {
      if (timeLeft <= 0) {
        clearInterval(countdown);
        timerEl.textContent = '';
        resendBtn.disabled  = false;
      } else {
        timeLeft--;
        const sec = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
        timerEl.textContent = `(00:${sec})`;
        resendBtn.disabled  = true;
      }
    }, 1000);

    // ─── Resend action ────────────────────────────────────────────────────────
    resendBtn.addEventListener('click', () => {
      if (resendBtn.disabled) return;
      resendBtn.disabled  = true;
      timeLeft            = 59;
      timerEl.textContent = '(00:59)';
      resendBtn.textContent = 'Mengirim...';
      // Re-attach timer span
      resendBtn.innerHTML = 'Dapatkan Kode Baru <span class="ml-1" id="timer">(00:59)</span>';

      // Restart countdown
      const timerEl2 = document.getElementById('timer');
      const c2 = setInterval(() => {
        if (timeLeft <= 0) {
          clearInterval(c2);
          timerEl2.textContent = '';
          resendBtn.disabled   = false;
        } else {
          timeLeft--;
          const sec = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
          timerEl2.textContent = `(00:${sec})`;
        }
      }, 1000);
    });
  </script>
</body>
</html>
